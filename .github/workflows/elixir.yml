name: Elixir CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  build:
    name: "build (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Floor: matches the declared `elixir: ~> 1.15` constraint.
          - elixir: "1.15.8"
            otp: "26.2.5"
          # Latest stable.
          - elixir: "1.19.5"
            otp: "28.4.2"

    steps:
      - uses: actions/checkout@v6
      - name: Set up Elixir
        uses: erlef/setup-beam@v1.24.0
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: ./deps
          # mix.lock is gitignored for this library, so we key on mix.exs
          # instead — the cache busts intentionally when declared deps change.
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.exs') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-
      - name: Install dependencies
        run: mix deps.get
      - name: Run tests
        run: mix test
      - name: Run credo
        run: mix credo --strict
      - name: Run formatter
        run: mix format --check-formatted

  dialyzer:
    name: "dialyzer (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15.8"
            otp: "26.2.5"
          - elixir: "1.19.5"
            otp: "28.4.2"

    steps:
      - uses: actions/checkout@v6
      - name: Set up Elixir
        id: beam
        uses: erlef/setup-beam@v1.24.0
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: ./deps
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.exs') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-
      - name: Restore Dialyzer PLT cache
        uses: actions/cache@v5
        with:
          path: ./priv/plts
          key: ${{ runner.os }}-plt-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-${{ hashFiles('mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-
      - name: Install dependencies
        run: mix deps.get
      - name: Run dialyzer
        run: mix dialyzer --format short
